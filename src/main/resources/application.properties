# ============================================
# APPLICATION
# ============================================
spring.application.name=DATN_SD_29
spring.config.import=optional:file:.env[.properties]

# ============================================
# DATASOURCE - SQL SERVER
# ============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=DATN_SD29_ByHat;encrypt=true;trustServerCertificate=true;characterEncoding=UTF-8;
spring.datasource.username=sa
spring.datasource.password=170207
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ============================================
# FLYWAY MIGRATION
# ============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# ============================================
# MONGODB (Audit Log)
# ============================================
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

# ============================================
# REDIS
# ============================================
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s

# ============================================
# MAIL
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=hh937808@gmail.com
spring.mail.password=bwug yqvw srit fcdz
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.timezone=Asia/Ho_Chi_Minh
app.mail.datetime-format=dd/MM/yyyy HH:mm

# ============================================
# THYMELEAF
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/

# ============================================
# WEBSOCKET
# ============================================
spring.websocket.allowed-origins=http://localhost:5173,http://localhost:8080

# ============================================
# SECURITY
# ============================================
# Set to false for development (all APIs public), true for production (role-based security)
security.api.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ============================================
# PAYMENT
# ============================================
# VAT percentage (applied to taxable base after all discounts)
payment.vat.percent=8
# Service fee percentage (0% = no service fee)
payment.service-fee.percent=0
# Maximum percentage of invoice payable with loyalty points
payment.points.max-usage-percent=40

# ============================================
# RESERVATION
# ============================================
# Check-in flexibility
reservation.checkin.early-buffer-minutes=60
reservation.checkin.late-buffer-minutes=30
reservation.checkin.allow-early-checkin=true
reservation.checkin.allow-late-checkin=true

# No-show monitoring
reservation.noshow.monitor.enabled=true
reservation.noshow.monitor.fixed-rate=300000
reservation.noshow.monitor.initial-delay=30000
reservation.noshow.grace-period-minutes=15

# ============================================
# OVERTIME MONITORING
# ============================================
overtime.monitor.enabled=true
overtime.monitor.fixed-rate=60000
overtime.monitor.initial-delay=10000
overtime.monitor.threshold-minutes=90
overtime.monitor.alert-window-minutes=120

# Urgency thresholds (in minutes)
overtime.alert.urgency.critical-threshold=30
overtime.alert.urgency.high-threshold=60
overtime.alert.urgency.medium-threshold=120
