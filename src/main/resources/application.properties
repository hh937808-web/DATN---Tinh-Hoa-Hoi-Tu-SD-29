# ALERTING THRESHOLDS AND RULES
# These thresholds define when system alerts should be triggered for monitoring purposes
# 
# CRITICAL ALERTS (Immediate Action Required):
# - 3 consecutive overtime detection failures
#   Indicates: Database connectivity issues or service malfunction
#   Action: Check database connection, review error logs, restart service if needed
#
# WARNING ALERTS (Investigation Recommended):
# - Execution time consistently exceeds 8 seconds (logged when > 10 seconds)
#   Indicates: Performance degradation, high table volume, or database query slowness
#   Action: Review database indexes, check server load, optimize queries
# - WebSocket connection count drops to zero
#   Indicates: All staff sessions disconnected, no active monitoring
#   Action: Verify staff are logged in, check network connectivity
#
# INFO ALERTS (Monitoring Only):
# - WebSocket connection count changes significantly (>50% drop)
#   Indicates: Multiple staff logged out or network issues
#   Action: Monitor for patterns, verify expected behavior
# - Alert broadcast failures (tracked in AlertServiceImpl)
#   Indicates: WebSocket delivery issues
#   Action: Check client connectivity, review WebSocket logs

